<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    <title>Notebing | Premium Social Experience</title>
    <meta name="description" content="Notebing — La plataforma social de notas atómicas. Descubrí contenido de alta señal en tus nichos favoritos.">

    <link rel="stylesheet" href="style.css">

    <!-- Tipografía de Alta Calidad -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons (Minimalista) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>
<body>

    <!-- CONTENEDOR PRINCIPAL (CSS Grid) -->
    <div class="app-container">

        <!-- SIDEBAR IZQUIERDO (Notion Style) -->
        <aside class="sidebar-left">
            <div class="sidebar-left-inner">
                <div class="logo-desktop">
                    <i data-lucide="layers" class="logo-icon"></i>
                    Note<span>bing</span>.
                </div>
                
                <nav class="nav-desktop">
                    <div class="nav-section-title">Navegación</div>
                    <button class="nav-item nav-item--desktop active" data-view="home">
                        <i data-lucide="home" class="nav-icon"></i> <span>Inicio</span>
                    </button>
                    <button class="nav-item nav-item--desktop" data-view="niches">
                        <i data-lucide="compass" class="nav-icon"></i> <span>Explorar</span>
                    </button>
                    
                    <div class="nav-section-divider"></div>
                    
                    <div class="nav-section-title">Tus Espacios</div>
                    <button class="nav-item nav-item--desktop" data-view="brain">
                        <i data-lucide="brain" class="nav-icon"></i> <span>Cerebro Privado</span>
                    </button>
                    <button class="nav-item nav-item--desktop" data-view="profile">
                        <i data-lucide="user" class="nav-icon"></i> <span>Perfil</span>
                    </button>
                </nav>
                <button class="btn-primary btn-compose-desktop" onclick="UI.focusComposer()">
                    <i data-lucide="pen-line" class="btn-icon"></i> Postear Nota
                </button>
            </div>
        </aside>

        <!-- ÁREA DE CONTENIDO PRINCIPAL (X Style Feed) -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <div class="avatar avatar--sm" id="top-bar-avatar">T</div>
                    <h1 id="view-title">Inicio</h1>
                </div>
                <div class="top-bar-actions">
                    <button id="theme-toggle" class="icon-btn" aria-label="Cambiar tema">
                        <i data-lucide="moon" class="theme-icon-dark"></i>
                        <i data-lucide="sun" class="theme-icon-light" style="display: none;"></i>
                    </button>
                </div>
            </header>

            <div id="view-container">
                <!-- Se inyectan vistas aquí -->
            </div>
        </main>

        <!-- SIDEBAR DERECHO (Widgets) -->
        <aside class="sidebar-right">
            <div class="sidebar-right-inner">
                <div class="widget">
                    <h3>Nichos en Tendencia</h3>
                    <div id="trending-niches"></div>
                </div>
                <div class="widget">
                    <h3>Sugerencias para ti</h3>
                    <div id="suggested-users"></div>
                </div>
            </div>
        </aside>

        <!-- NAVEGACIÓN INFERIOR (Mobile) -->
        <nav class="bottom-nav">
            <button class="nav-item nav-item--mobile active" data-view="home">
                <i data-lucide="home" class="nav-icon"></i><span>Inicio</span>
            </button>
            <button class="nav-item nav-item--mobile" data-view="niches">
                <i data-lucide="compass" class="nav-icon"></i><span>Explorar</span>
            </button>
            <button class="nav-item nav-item--mobile btn-compose-mobile" onclick="UI.focusComposer()">
                <div class="fab-inner">
                   <i data-lucide="plus" class="nav-icon"></i>
                </div>
            </button>
            <button class="nav-item nav-item--mobile" data-view="brain">
                <i data-lucide="brain" class="nav-icon"></i><span>Cerebro</span>
            </button>
            <button class="nav-item nav-item--mobile" data-view="profile">
                <i data-lucide="user" class="nav-icon"></i><span>Perfil</span>
            </button>
        </nav>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- MODAL CUSTOM -->
    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
        <div class="modal">
            <p id="modal-message" class="modal-message"></p>
            <div id="modal-input-wrap" class="modal-input-wrap hidden">
                <textarea id="modal-input" class="modal-textarea" rows="4"></textarea>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancelar</button>
                <button id="modal-confirm" class="btn-primary btn--danger">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
