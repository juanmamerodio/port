<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    <title>Notebing | Premium Social Experience</title>
    
    <!-- 1. Framework de Utilidades (Tailwind) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Estilos Personalizados (Variables, Animaciones, Temas) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- 3. Tipografía de Alta Calidad -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[var(--bg-base)] text-[var(--text-primary)] antialiased">

    <!-- CONTENEDOR PRINCIPAL (Layout Grid) -->
    <div class="app-container flex flex-col md:flex-row min-h-screen max-w-[1280px] mx-auto">
        
        <!-- SIDEBAR IZQUIERDO (Navegación Desktop) -->
        <aside class="sidebar-left hidden md:flex flex-col w-[260px] p-5 sticky top-0 h-screen">
            <div class="logo-desktop text-3xl font-extrabold text-[var(--accent-primary)] mb-8 px-4">
                Note<span>bing</span>.
            </div>
            <nav class="nav-desktop flex flex-col gap-2">
                <button class="nav-item-desktop active flex items-center gap-4 px-5 py-3 text-xl font-semibold rounded-full transition-all" data-view="home">
                    <span class="text-2xl">🏠</span> <span>Inicio</span>
                </button>
                <button class="nav-item-desktop flex items-center gap-4 px-5 py-3 text-xl font-semibold rounded-full transition-all" data-view="niches">
                    <span class="text-2xl">🎯</span> <span>Nichos</span>
                </button>
                <button class="nav-item-desktop flex items-center gap-4 px-5 py-3 text-xl font-semibold rounded-full transition-all" data-view="brain">
                    <span class="text-2xl">🧠</span> <span>Cerebro</span>
                </button>
                <button class="nav-item-desktop flex items-center gap-4 px-5 py-3 text-xl font-semibold rounded-full transition-all" data-view="profile">
                    <span class="text-2xl">👤</span> <span>Perfil</span>
                </button>
            </nav>
            <button class="btn-compose-desktop mt-8 bg-[var(--accent-primary)] text-white py-4 rounded-full text-lg font-bold shadow-lg hover:bg-[var(--accent-hover)] transition-all" onclick="UI.focusComposer()">
                Postear
            </button>
        </aside>

        <!-- ÁREA DE CONTENIDO PRINCIPAL (Donde el Router inyecta las vistas) -->
        <main class="main-content flex-1 min-w-0 max-w-[600px] mx-auto border-x border-[var(--border-color)] bg-[var(--bg-surface)] min-h-screen pb-20 md:pb-0">
            
            <!-- Barra Superior Dinámica -->
            <header class="top-bar sticky top-0 z-50 flex justify-between items-center px-4 py-3 border-b border-[var(--border-color)] bg-[var(--bg-glass)] backdrop-blur-md">
                <div class="flex items-center gap-3">
                    <div class="avatar w-8 h-8 flex items-center justify-center text-xs font-bold text-white bg-[var(--accent-primary)] rounded-full" id="top-bar-avatar">T</div>
                    <h1 id="view-title" class="text-lg font-bold">Inicio</h1>
                </div>
                <div class="top-bar-actions">
                    <button id="theme-toggle" class="icon-btn text-xl" aria-label="Cambiar tema">🌗</button>
                </div>
            </header>

            <!-- CONTENEDOR DE VISTAS (Inyección de HTML por JS) -->
            <div id="view-container">
                <!-- El contenido de Home, Niches, Brain o Profile se cargará aquí -->
            </div>
        </main>

        <!-- SIDEBAR DERECHO (Widgets Desktop) -->
        <aside class="sidebar-right hidden lg:flex flex-col w-[320px] p-5 sticky top-0 h-screen gap-5">
            <div class="widget bg-[var(--bg-surface)] border border-[var(--border-color)] p-4 rounded-2xl shadow-sm">
                <h3 class="font-bold text-lg mb-4">Nichos Sugeridos</h3>
                <div id="trending-niches" class="flex flex-col gap-4">
                    <!-- Inyectado por JS -->
                </div>
            </div>
            <div class="widget bg-[var(--bg-surface)] border border-[var(--border-color)] p-4 rounded-2xl shadow-sm">
                <h3 class="font-bold text-lg mb-4">Seguir Usuarios</h3>
                <div id="suggested-users" class="flex flex-col gap-4">
                    <!-- Inyectado por JS -->
                </div>
            </div>
        </aside>

        <!-- NAVEGACIÓN INFERIOR (Mobile Only) -->
        <nav class="bottom-nav md:hidden fixed bottom-0 left-0 w-full bg-[var(--bg-glass)] backdrop-blur-lg border-t border-[var(--border-color)] flex justify-around py-3 px-2 z-50">
            <button class="nav-item active flex flex-col items-center gap-1 text-[10px] font-semibold" data-view="home">
                <span class="text-2xl">🏠</span><span>Inicio</span>
            </button>
            <button class="nav-item flex flex-col items-center gap-1 text-[10px] font-semibold" data-view="niches">
                <span class="text-2xl">🎯</span><span>Nichos</span>
            </button>
            <button class="nav-item flex flex-col items-center gap-1 text-[10px] font-semibold" data-view="brain">
                <span class="text-2xl">🧠</span><span>Cerebro</span>
            </button>
            <button class="nav-item flex flex-col items-center gap-1 text-[10px] font-semibold" data-view="profile">
                <span class="text-2xl">👤</span><span>Perfil</span>
            </button>
        </nav>
    </div>

    <!-- SISTEMA DE NOTIFICACIONES (Toast) -->
    <div id="toast" class="toast">Mensaje</div>

    <!-- MOTOR DE LA APLICACIÓN (Lógica de Negocio y Renderizado) -->
    
</body>
<script src="script.js"></script>

</html>
